<script type="text/x-dc" data-dc-script data-props="{&quot;speed&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 1, &quot;min&quot;: 0.5, &quot;max&quot;: 2, &quot;step&quot;: 0.1, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Motion&quot;}, &quot;cycleCopy&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Copy&quot;}}">
class Component extends DCLogic {
  state = { tick: 0 };

  phrases = ['Warming tires', 'Setting the grid', 'Scouting rookies', 'Syncing telemetry'];

  componentDidMount() {
    this.timer = setInterval(() => {
      if (this.props.cycleCopy ?? true) {
        this.setState(s => ({ tick: s.tick + 1 }));
      }
    }, 1600);
    this.applySpeed();
  }

  componentDidUpdate() { this.applySpeed(); }
  componentWillUnmount() { clearInterval(this.timer); }

  applySpeed() {
    const mult = 1 / (this.props.speed ?? 1);
    document.documentElement.style.setProperty('--f1-speed', String(mult));
    // Scale every f1 animation via playbackRate-like duration multiplier
    document.getAnimations().forEach(a => {
      if (a.animationName && a.animationName.startsWith('f1-')) {
        a.playbackRate = this.props.speed ?? 1;
      }
    });
  }

  renderVals() {
    const cycle = this.props.cycleCopy ?? true;
    const phrase = cycle ? this.phrases[this.state.tick % this.phrases.length] : 'Loading';
    return {
      phrase: phrase,
      lap: String((this.state.tick % 20) + 1),
    };
  }
}
</script>
